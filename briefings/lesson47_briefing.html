<script>
  const slides = [
    {
      label: "Opening Question",
      image: "linear-gradient(135deg, rgba(29,72,120,.45), rgba(5,12,22,.78)), url('images/lesson47/lifecamelot.png')",
      heading: "The Age of Camelot",
      text: "John F. Kennedy’s presidency has often been remembered as 'Camelot'—a brief moment of youth, elegance, hope, and national energy. But historians still debate whether that image reflects reality or memory.",
      bullets: [
        "Kennedy became a symbol of optimism and modern leadership.",
        "His presidency was remembered as glamorous and inspiring.",
        "Students should ask whether Camelot was a real accomplishment or a powerful myth."
      ],
      remember: "Remember this: Kennedy’s reputation was shaped not only by what he did, but also by how Americans remembered him afterward."
    },
    {
      label: "Public Image",
      image: "linear-gradient(135deg, rgba(45,97,157,.40), rgba(5,12,22,.82)), url('images/lesson47/jfkandjackie.png')",
      heading: "JFK, Jackie, and the Power of Image",
      text: "The Kennedy White House projected style, culture, and confidence. John and Jacqueline Kennedy helped create an image of elegance that made the administration feel new, modern, and exciting.",
      bullets: [
        "The Kennedys helped define a polished public image.",
        "Style and personality became part of political influence.",
        "This image strengthened the idea of Camelot."
      ],
      remember: "Remember this: image mattered in the Kennedy years, and it helped shape how people judged his presidency."
    },
    {
      label: "Media and Politics",
      image: "linear-gradient(135deg, rgba(24,84,145,.40), rgba(7,15,26,.84)), url('images/lesson47/jfk_nixon.png')",
      heading: "Kennedy and the Television Age",
      text: "Kennedy’s 1960 debate with Richard Nixon helped show how important television had become in American politics. Kennedy often looked calm, confident, and composed on screen.",
      bullets: [
        "Television changed how candidates connected with voters.",
        "Kennedy benefited from appearing youthful and poised.",
        "His image became part of his political strength."
      ],
      remember: "Remember this: Kennedy was one of the first presidents fully shaped by the age of television."
    },
    {
      label: "New Frontier",
      image: "linear-gradient(135deg, rgba(17,70,126,.40), rgba(6,11,20,.84)), url('images/lesson47/onthemoon.png')",
      heading: "The New Frontier and the Moon Goal",
      text: "Kennedy’s New Frontier represented ambition at home and abroad. One of its most memorable goals was the challenge to reach the moon, turning science and exploration into symbols of national purpose.",
      bullets: [
        "Kennedy wanted to project energy, growth, and confidence.",
        "The moon challenge linked science to Cold War competition.",
        "The space race became part of American identity in the 1960s."
      ],
      remember: "Remember this: the moon program symbolized Kennedy’s belief that America should aim high and prove its strength."
    },
    {
      label: "Cold War Failure",
      image: "linear-gradient(135deg, rgba(97,41,41,.28), rgba(12,14,23,.78)), url('images/lesson47/map of cuba bay of pigs.png')",
      heading: "The Bay of Pigs",
      text: "Kennedy’s first major foreign policy crisis was the failed Bay of Pigs invasion in Cuba. The attempt to overthrow Fidel Castro was a major embarrassment and damaged Kennedy early in his presidency.",
      bullets: [
        "The invasion failed and hurt American credibility.",
        "It exposed the risks of Cold War intervention.",
        "It made Kennedy appear inexperienced at a critical moment."
      ],
      remember: "Remember this: the Bay of Pigs was one of Kennedy’s clearest foreign policy failures."
    },
    {
      label: "Cold War Symbol",
      image: "linear-gradient(135deg, rgba(66,78,120,.30), rgba(8,14,25,.82)), url('images/lesson47/kennedy in berlin.png')",
      heading: "Berlin and a Divided World",
      text: "Berlin became one of the clearest symbols of the Cold War. Kennedy’s presence there showed American support for West Berlin and emphasized the global struggle between democracy and communism.",
      bullets: [
        "Berlin represented Cold War division in physical form.",
        "Kennedy used speeches and appearances to show resolve.",
        "The city became a symbol of the conflict between East and West."
      ],
      remember: "Remember this: Berlin was not just a city—it was one of the most visible symbols of the Cold War."
    },
    {
      label: "Nuclear Brinkmanship",
      image: "linear-gradient(135deg, rgba(95,46,46,.22), rgba(10,16,26,.82)), url('images/lesson47/cuban missle crisis.png')",
      heading: "The Cuban Missile Crisis",
      text: "The Cuban Missile Crisis brought the United States and the Soviet Union to the edge of nuclear war. Kennedy had to respond carefully to Soviet missiles in Cuba without triggering disaster.",
      bullets: [
        "The crisis was one of the most dangerous moments of the Cold War.",
        "Kennedy used a naval blockade and intense diplomacy.",
        "Many historians see this as Kennedy’s greatest test."
      ],
      remember: "Remember this: the Cuban Missile Crisis is one of the strongest arguments for Kennedy as an effective leader."
    },
    {
      label: "Arms Race",
      image: "linear-gradient(135deg, rgba(102,84,42,.18), rgba(8,13,21,.84)), url('images/lesson47/Nuclear Weapons Stockpiles, 1958-1964.png')",
      heading: "Why the Crisis Was So Dangerous",
      text: "The arms race helps explain why the missile crisis mattered so much. Both superpowers were rapidly building nuclear stockpiles, making the possibility of war even more terrifying.",
      bullets: [
        "The U.S. and USSR were both increasing nuclear weapons.",
        "Cold War competition was not abstract—it carried real danger.",
        "This made Kennedy’s crisis leadership especially important."
      ],
      remember: "Remember this: Kennedy governed at a time when a single Cold War crisis could have become catastrophic."
    },
    {
      label: "Civil Rights Pressure",
      image: "linear-gradient(135deg, rgba(19,92,102,.26), rgba(8,16,28,.84)), url('images/lesson47/march on washington.png')",
      heading: "Civil Rights and the Limits of Camelot",
      text: "Kennedy’s presidency was also shaped by civil rights pressure. The March on Washington showed that the struggle for equality was becoming impossible for national leaders to avoid or delay.",
      bullets: [
        "Civil rights activists pushed Kennedy to act more forcefully.",
        "The movement exposed the limits of symbolic leadership alone.",
        "Kennedy’s domestic record looked more mixed than his public image."
      ],
      remember: "Remember this: Camelot looked hopeful, but serious racial injustice still challenged the nation."
    },
    {
      label: "Assassination",
      image: "linear-gradient(135deg, rgba(58,58,78,.26), rgba(7,10,19,.88)), url('images/lesson47/jfk in limo.png')",
      heading: "Assassination in Dallas",
      text: "Kennedy’s assassination in Dallas on November 22, 1963 shocked the nation and changed the way Americans remembered him. His presidency ended suddenly, before many of its promises could be fully tested.",
      bullets: [
        "The assassination froze Kennedy’s image in national memory.",
        "It made many Americans see him as a symbol of lost promise.",
        "His legacy became tied to tragedy as much as policy."
      ],
      remember: "Remember this: Kennedy’s unfinished presidency is one reason his historical reputation remains so powerful."
    },
    {
      label: "Transfer of Power",
      image: "linear-gradient(135deg, rgba(58,58,78,.24), rgba(7,10,19,.88)), url('images/lesson47/lbj jackie on plane.png')",
      heading: "The Nation Moves Forward",
      text: "The swearing-in of Lyndon B. Johnson aboard Air Force One captured the immediate transition of power after Kennedy’s death. It was one of the most dramatic moments in modern presidential history.",
      bullets: [
        "Johnson took office almost immediately after the assassination.",
        "The image of Jackie Kennedy beside him became unforgettable.",
        "It symbolized both continuity and national trauma."
      ],
      remember: "Remember this: even in crisis, the presidency had to continue."
    },
    {
      label: "Legacy",
      image: "linear-gradient(135deg, rgba(80,80,90,.28), rgba(7,10,19,.90)), url('images/lesson47/funeral.png')",
      heading: "Grief, Memory, and Legacy",
      text: "Kennedy’s funeral helped turn him into a national symbol. The mourning that followed deepened the sense that Camelot had been something precious and suddenly lost.",
      bullets: [
        "Public grief helped shape Kennedy’s long-term legacy.",
        "His memory became linked to youth, promise, and tragedy.",
        "This is why historians still debate image versus achievement."
      ],
      remember: "Final thought: Was JFK a great president because of what he achieved, or because Americans never stopped imagining what might have been?"
    }
  ];

  let current = 0;

  const imageBand = document.getElementById('imageBand');
  const imageLabel = document.getElementById('imageLabel');
  const slideHeading = document.getElementById('slideHeading');
  const slideText = document.getElementById('slideText');
  const bulletList = document.getElementById('bulletList');
  const rememberBox = document.getElementById('rememberBox');
  const progressText = document.getElementById('progressText');
  const progressFill = document.getElementById('progressFill');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');

  function renderSlide(index){
    const s = slides[index];
    imageBand.style.background = s.image;
    imageBand.style.backgroundSize = 'cover';
    imageBand.style.backgroundPosition = 'center';
    imageLabel.textContent = s.label;
    slideHeading.textContent = s.heading;
    slideText.textContent = s.text;
    bulletList.innerHTML = s.bullets.map(b => `<li>${b}</li>`).join('');
    rememberBox.innerHTML = `<strong>Remember This</strong>${s.remember}`;
    progressText.textContent = `Slide ${index + 1} of ${slides.length}`;
    progressFill.style.width = `${((index + 1) / slides.length) * 100}%`;
    prevBtn.disabled = index === 0;
    nextBtn.disabled = index === slides.length - 1;
  }

  prevBtn.addEventListener('click', () => {
    if(current > 0){
      current--;
      renderSlide(current);
    }
  });

  nextBtn.addEventListener('click', () => {
    if(current < slides.length - 1){
      current++;
      renderSlide(current);
    }
  });

  document.addEventListener('keydown', (e) => {
    if(e.key === 'ArrowRight' && current < slides.length - 1){
      current++;
      renderSlide(current);
    }
    if(e.key === 'ArrowLeft' && current > 0){
      current--;
      renderSlide(current);
    }
  });

  renderSlide(current);
</script>
